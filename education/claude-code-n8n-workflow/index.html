<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>매일 하는 반복 업무에서 탈출하는 가장 빠른 방법 (Claude Code + n8n)</title>
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css"/>
<style>
:root{
  --blue:#1456f0; --sky:#3daeff; --pink:#ea5ec1;
  --tintBlue:#eaf1ff; --pLight:#60a5fa; --p500:#3b82f6; --p600:#2563eb; --p700:#1d4ed8; --deep:#17437d;
  --text:#222222; --headDark:#18181b; --darkSurf:#181e25; --sec:#45515e; --ter:#8e8e93; --helper:#5f5f5f;
  --white:#ffffff; --container:#f0f0f0; --divider:#f2f3f5; --border:#e5e7eb;
  --successBG:#e8ffea; --successTx:#16a34a;
  --grad:linear-gradient(135deg,#1456f0 0%,#3b82f6 50%,#60a5fa 100%);
  --shadowStd:0 4px 6px rgba(0,0,0,.08);
  --shadowGlow:0 0 15px rgba(44,30,116,.16);
  --font:"Pretendard Variable",Pretendard,-apple-system,system-ui,sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;font-family:var(--font);-webkit-font-smoothing:antialiased;}
html,body{height:100%;background:#0c0e12;overflow:hidden;}
/* stage keeps fixed 16:9, scales to viewport */
#stage{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;}
#deck{position:relative;width:1280px;height:720px;transform-origin:center center;}
.slide{position:absolute;inset:0;background:var(--white);overflow:hidden;display:none;}
.slide.active{display:block;}
.slide.dark{background:var(--darkSurf);}
.slide.grad{background:var(--grad);}

/* ---- shared frame ---- */
.chapter{position:absolute;left:48px;top:38px;font-weight:600;font-size:11.5px;letter-spacing:1px;color:var(--ter);}
.slide.dark .chapter,.slide.grad .chapter{color:#aeb6c2;}
.logo{position:absolute;right:48px;top:40px;height:25px;}
.headline{position:absolute;left:48px;top:96px;font-weight:700;font-size:31px;line-height:1.2;color:var(--text);letter-spacing:-.02em;}
.subtitle{position:absolute;left:48px;top:165px;font-weight:500;font-size:15.5px;line-height:1.45;color:var(--sec);}
.pagenum{position:absolute;left:48px;bottom:34px;font-weight:500;font-size:10px;color:var(--ter);}
.source{position:absolute;right:48px;bottom:34px;font-weight:400;font-size:9px;color:var(--ter);}
.slide.dark .pagenum,.slide.grad .pagenum{color:#aeb6c2;}
.slide.dark .source,.slide.grad .source{color:#8a93a0;}

/* ---- building blocks ---- */
.card{position:absolute;background:var(--white);border-radius:14px;box-shadow:var(--shadowStd);}
.card.flat{box-shadow:none;}
.card.bd{border:1px solid var(--border);}
.card.tint{background:var(--tintBlue);box-shadow:none;}
.card.div{background:var(--divider);box-shadow:none;}
.card.dk{background:var(--darkSurf);box-shadow:none;}
.card.code{background:#0f1620;box-shadow:none;}
.card.gradcard{background:var(--grad)!important;}
.card.glow{box-shadow:var(--shadowGlow);}
.chip{position:absolute;border-radius:14px;display:flex;align-items:center;justify-content:center;}
.chip img{width:52%;height:52%;object-fit:contain;}
.pill{display:inline-flex;align-items:center;justify-content:center;border-radius:999px;font-weight:600;white-space:nowrap;}
.num-circle{position:absolute;border-radius:50%;background:var(--blue);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;}
.arrow{position:absolute;display:flex;align-items:center;justify-content:center;color:var(--ter);font-size:22px;}
.divline{position:absolute;height:1px;background:var(--divider);}

/* text helpers */
.t{position:absolute;color:var(--text);}
.w7{font-weight:700;} .w6{font-weight:600;} .w5{font-weight:500;} .w4{font-weight:400;} .w8{font-weight:800;}
.cBlue{color:var(--blue);} .cSec{color:var(--sec);} .cTer{color:var(--ter);} .cWhite{color:#fff;}
.cDeep{color:var(--deep);} .cGreen{color:var(--successTx);} .cBorder{color:var(--border);}

/* tables */
table.cmp{position:absolute;border-collapse:collapse;}
table.cmp td{border:1px solid var(--border);padding:0 12px;vertical-align:middle;}

/* nav */
#nav{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);display:flex;align-items:center;gap:14px;
  background:rgba(24,30,37,.82);backdrop-filter:blur(8px);padding:8px 16px;border-radius:999px;z-index:50;}
#nav button{border:none;background:transparent;color:#fff;font-size:18px;cursor:pointer;width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;transition:background .15s;}
#nav button:hover{background:rgba(255,255,255,.15);}
#nav button:disabled{opacity:.3;cursor:default;}
#counter{color:#fff;font-weight:600;font-size:13px;min-width:54px;text-align:center;letter-spacing:.5px;}
#bar{position:fixed;top:0;left:0;height:3px;background:var(--blue);z-index:50;transition:width .25s;}
.edge{position:fixed;top:0;bottom:0;width:14%;z-index:40;cursor:pointer;}
.edge.l{left:0;} .edge.r{right:0;}
#hint{position:fixed;right:16px;bottom:20px;z-index:50;color:#cfd6e0;font-size:11px;font-weight:500;background:rgba(24,30,37,.7);padding:6px 12px;border-radius:999px;backdrop-filter:blur(8px);}
/* overview grid */
#overview{position:fixed;inset:0;z-index:60;background:#0c0e12;display:none;overflow:auto;padding:28px;}
#overview.show{display:block;}
#ovTitle{color:#fff;font-weight:700;font-size:18px;margin-bottom:18px;text-align:center;}
#ovGrid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;max-width:1200px;margin:0 auto;}
.ovCell{position:relative;cursor:pointer;border-radius:8px;overflow:hidden;border:2px solid transparent;transition:border-color .12s,transform .12s;background:#fff;}
.ovCell:hover{border-color:var(--blue);transform:translateY(-2px);}
.ovCell.cur{border-color:var(--blue);}
.ovNum{position:absolute;left:6px;top:4px;z-index:2;color:#fff;font-size:11px;font-weight:700;background:rgba(0,0,0,.45);border-radius:4px;padding:1px 6px;}
.ovThumb{width:100%;aspect-ratio:16/9;overflow:hidden;position:relative;}
.ovThumb>.slide{position:absolute;top:0;left:0;display:block!important;transform-origin:top left;}
/* presenter */
body.presenter{background:#15181d;overflow:auto;}
body.presenter #stage,body.presenter #nav,body.presenter #bar,body.presenter .edge,body.presenter #hint,body.presenter #overview{display:none!important;}
#pres{display:none;color:#e7ebf0;padding:26px;min-height:100vh;box-sizing:border-box;}
body.presenter #pres{display:flex;gap:26px;align-items:flex-start;}
#pres .col{display:flex;flex-direction:column;gap:10px;}
#pres .lab{font-size:12px;font-weight:600;color:#9aa4b2;letter-spacing:.5px;}
#pres .frame{border-radius:10px;overflow:hidden;border:1px solid #2a2f37;background:#fff;position:relative;}
#pres .frame>.slide{position:absolute;top:0;left:0;display:block!important;transform-origin:top left;}
#pres .timer{font-size:46px;font-weight:700;color:#fff;letter-spacing:1px;}
#pres .pgind{font-size:15px;color:#9aa4b2;font-weight:600;}
#pres .ctrl{display:flex;gap:10px;margin-top:6px;}
#pres .ctrl button{background:#222a33;color:#fff;border:none;border-radius:8px;padding:10px 18px;font-size:15px;cursor:pointer;font-weight:600;}
#pres .ctrl button:hover{background:#2d3742;}
@media print{ #nav,#bar,.edge,#hint{display:none;} }
</style>
</head>
<body>
<div id="bar"></div>
<div id="stage"><div id="deck"></div></div>
<div class="edge l" onclick="prev()"></div>
<div class="edge r" onclick="next()"></div>
<div id="nav">
  <button onclick="prev()" id="pBtn" aria-label="이전">‹</button>
  <span id="counter">1 / 28</span>
  <button onclick="next()" id="nBtn" aria-label="다음">›</button>
</div>
<div id="hint">F 전체화면 · O 개요 · P 발표자보기 · ←/→ 이동</div>
<div id="overview"><div id="ovTitle">전체 슬라이드 (클릭하면 이동 · ESC 닫기)</div><div id="ovGrid"></div></div>
<div id="pres"></div>

<script>
const LOGO_D="assets/logo_dark.png", LOGO_W="assets/logo_white.png";
const ic=(n,c)=>`assets/icons/${n}_${c}.png`;

/* helper builders returning HTML strings */
function chip(x,y,d,name,color,bg){return `<div class="chip" style="left:${x}px;top:${y}px;width:${d}px;height:${d}px;background:${bg};border-radius:${d*0.28}px;"><img src="${ic(name,color)}"></div>`;}
function header(chapter,dark){return `${chapter?`<div class="chapter">${chapter}</div>`:""}<img class="logo" src="${dark?LOGO_W:LOGO_D}">`;}
function foot(page,src,dark){return `<div class="pagenum">${page}</div>${src?`<div class="source">${src}</div>`:""}`;}
function title(h,s){return `<div class="headline">${h}</div>${s?`<div class="subtitle">${s}</div>`:""}`;}

/* px scale: PPT inch * 96 = px (1280/13.333) */
const I=96;

const slides=[];

/* ---------- S1 Cover ---------- */
slides.push(`
<img class="logo" src="${LOGO_D}" style="top:48px;">
<span class="pill" style="left:48px;top:130px;background:var(--tintBlue);color:var(--blue);font-size:11.5px;padding:8px 16px;">사내 실습 워크숍 · 2시간 속성</span>
<div class="t w7" style="left:48px;top:185px;font-size:37px;line-height:1.18;letter-spacing:-.02em;">매일 하는 반복 업무에서<br>탈출하는 가장 빠른 방법</div>
<div class="t w5 cSec" style="left:48px;top:330px;font-size:16px;">Claude Code(두뇌) · n8n-MCP(목) · n8n(몸)으로 코드 한 줄 없이 업무를 자동화합니다</div>
<div class="card glow gradcard" style="left:48px;top:392px;width:1184px;height:230px;border-radius:22px;">
  <div class="t w6" style="left:53px;top:36px;font-size:14px;color:#dce9ff;">오늘의 목표</div>
  ${[["2시간","속성으로 끝내기"],["2개","자동화 워크플로우 완성"],["0줄","코딩 없이 자연어로"]].map((k,i)=>`
    <div class="t w7 cWhite" style="left:${53+i*378}px;top:84px;font-size:44px;">${k[0]}</div>
    <div class="t w5" style="left:${53+i*378}px;top:165px;font-size:13.5px;color:#dce9ff;">${k[1]}</div>`).join("")}
</div>
<div class="t w6" style="left:48px;top:636px;font-size:13px;">마케팅팀 박현웅</div>
<div class="t w4 cTer" style="right:48px;top:636px;font-size:11px;">강의 일자 ____________</div>
`);

/* ---------- S2 Overview ---------- */
slides.push(`${header("OVERVIEW",false)}${title("오늘, ‘두뇌·목·몸’을 연결해 자동화를 완성합니다","코드 한 줄 없이, 자연어로 업무 자동화 워크플로우를 직접 만들고 배포합니다")}
${[["mail","실습 1","받은 메일 AI 요약·분류","새 메일을 AI가 요약하고 중요도를 판단해 중요한 것만 구글 챗으로 알림","Gmail → AI → 구글 챗"],
   ["rss","실습 2","경쟁사 블로그·SNS 모니터링","RSS 새 글을 AI가 요약해 스프레드시트에 한 줄씩 누적 정리","RSS → AI 요약 → 스프레드시트"]]
  .map((it,i)=>{const x=48+i*(564+38);return `
  <div class="card" style="left:${x}px;top:240px;width:564px;height:240px;">
    ${chip(33,33,67,it[0],"blue","var(--tintBlue)")}
    <span class="pill" style="position:absolute;right:30px;top:44px;background:var(--tintBlue);color:var(--blue);font-size:11px;padding:7px 14px;">${it[1]}</span>
    <div class="t w7" style="left:33px;top:115px;font-size:19px;">${it[2]}</div>
    <div class="t w4 cSec" style="left:33px;top:165px;width:498px;font-size:13.5px;line-height:1.45;">${it[3]}</div>
    <div class="divline" style="left:33px;top:204px;width:498px;"></div>
    <div class="t w6 cBlue" style="left:33px;top:209px;font-size:12px;">${it[4]}</div>
  </div>`;}).join("")}
<div class="card div" style="left:48px;top:500px;width:1184px;height:125px;">
  ${chip(31,33,59,"check","green","var(--successBG)")}
  <div class="t w6 cGreen" style="left:111px;top:26px;font-size:13px;">오늘 끝나면</div>
  <div class="t w6" style="left:111px;top:56px;width:1040px;font-size:16px;line-height:1.35;">내 업무 중 반복되는 일 한 가지를 ‘자동으로 돌아가는 상태’로 만든 채 퇴근합니다.</div>
</div>
${foot("02","삼삼엠투 사내 교육 · Claude Code + n8n",false)}`);

/* ---------- divider builder ---------- */
function divider(num,kor,lead,page){return `<div data-dark="1">${header("",true)}
<div class="t w8" style="left:48px;top:190px;font-size:86px;color:#2a3340;">${num}</div>
<div class="t w6" style="left:53px;top:322px;font-size:13px;letter-spacing:2px;color:var(--pLight);">SECTION ${num}</div>
<div class="t w7 cWhite" style="left:48px;top:352px;font-size:42px;line-height:1.15;">${kor}</div>
${lead?`<div class="t w5" style="left:50px;top:464px;font-size:18px;color:#9aa4b2;line-height:1.45;">${lead}</div>`:""}
${foot(page,"",true)}</div>`;}

/* ---------- S3 divider ---------- */
slides.push(divider("01","Claude Code 준비하기","Windows 데스크탑에 설치하고, 두뇌를 깨웁니다","03"));

/* ---------- S4 Claude Code란 ---------- */
slides.push(`${header("01 · CLAUDE CODE",false)}${title("Claude Code = 설계하고 만드는 ‘두뇌’","자연어로 말하면 자동화의 구조를 이해하고, 워크플로우를 직접 설계·생성합니다")}
<div class="card" style="left:48px;top:240px;width:451px;height:384px;">
  ${chip(34,38,77,"brain","pink","#fbe4f4")}
  <div class="t w6" style="left:34px;top:139px;font-size:15px;">두뇌의 역할</div>
  <div class="t w4 cSec" style="left:34px;top:187px;font-size:14.5px;line-height:1.5;">사람의 언어를 이해하고<br>무엇을·어떻게 만들지<br>설계·생성·관리합니다.</div>
  <span class="pill" style="position:absolute;left:34px;bottom:34px;width:383px;height:44px;background:var(--divider);color:var(--helper);font-weight:500;font-size:12px;">단, 혼자서는 실행하지 못합니다</span>
</div>
${[["chat","자연어 이해","‘새 메일 오면 요약해줘’ 한 마디를 작업으로 해석"],
   ["node","워크플로우 설계","어떤 노드를 어떤 순서로 연결할지 구조를 설계"],
   ["shield","검증 · 수정","배포 전 설정 오류를 점검하고 자동으로 고침"]]
  .map((c,i)=>{const y=240+i*(117+16);return `
  <div class="card bd flat" style="left:538px;top:${y}px;width:694px;height:117px;">
    ${chip(29,30,58,c[0],"blue","var(--tintBlue)")}
    <div class="t w7" style="left:106px;top:25px;font-size:16px;">${c[1]}</div>
    <div class="t w4 cSec" style="left:106px;top:63px;font-size:12.5px;line-height:1.4;">${c[2]}</div>
  </div>`;}).join("")}
${foot("04","",false)}`);

/* ---------- process flow builder ---------- */
function flow(items,topPx,hPx){
  const n=items.length, aw=48, total=1184, cw=(total-aw*(n-1))/n;
  return items.map((st,i)=>{const x=48+i*(cw+aw);return `
  <div class="card" style="left:${x}px;top:${topPx}px;width:${cw}px;height:${hPx}px;">
    <div class="num-circle" style="left:27px;top:27px;width:44px;height:44px;font-size:15px;">${i+1}</div>
    ${st.icon?`<img src="${ic(st.icon,'blue')}" style="position:absolute;right:30px;top:31px;width:38px;height:38px;">`:""}
    <div class="t w7" style="left:27px;top:88px;width:${cw-54}px;font-size:14.5px;">${st.title}</div>
    <div class="t w4 cSec" style="left:27px;top:${hPx>180?128:118}px;width:${cw-54}px;font-size:11.5px;line-height:1.4;">${st.desc}</div>
  </div>
  ${i<n-1?`<div class="arrow" style="left:${x+cw}px;top:${topPx}px;width:${aw}px;height:${hPx}px;">→</div>`:""}`;}).join("");
}

/* ---------- S5 설치1 ---------- */
slides.push(`${header("01 · CLAUDE CODE",false)}${title("1단계 · Windows 데스크탑 버전 설치","공식 사이트에서 내려받아 설치합니다 (사전에 받아두면 시간을 아낄 수 있어요)")}
${flow([
  {icon:"deploy",title:"공식 사이트 접속",desc:"claude.com/ko/download 로 접속"},
  {icon:"code",title:"Windows용 내려받기",desc:"데스크탑(.exe) 설치 파일을 다운로드"},
  {icon:"bolt",title:"설치 실행",desc:"안내에 따라 설치를 완료"},
  {icon:"robot",title:"로그인 준비",desc:"Claude 계정으로 로그인할 준비"}],245,192)}
<div class="card tint" style="left:48px;top:480px;width:1184px;height:139px;">
  ${chip(31,40,59,"check","blue","var(--white)")}
  <div class="t w6 cBlue" style="left:115px;top:29px;font-size:13px;">사전 준비물</div>
  <div class="t w5" style="left:115px;top:61px;width:1037px;font-size:15px;line-height:1.4;">설치 파일은 강의 전 미리 다운로드(https://claude.com/ko/download) → 당일에는 ‘로그인 후 실행’부터 바로 시작합니다.</div>
</div>
${foot("05","다운로드: https://claude.com/ko/download",false)}`);

/* ---------- S6 설치2 + screenshot ---------- */
slides.push(`${header("01 · CLAUDE CODE",false)}${title("2단계 · 실행 후 Claude Code 열기","데스크탑 앱에서 로그인하고, Claude Code를 엽니다")}
${[["설치한 데스크탑 앱 실행","바탕화면/시작메뉴에서 앱을 엽니다"],
   ["계정으로 로그인","Claude 계정으로 로그인합니다"],
   ["Claude Code 열기","앱에서 Claude Code 화면으로 진입합니다"]]
  .map((st,i)=>{const y=245+i*120;return `
  <div class="num-circle" style="left:48px;top:${y}px;width:48px;height:48px;font-size:16px;">${i+1}</div>
  ${i<2?`<div style="position:absolute;left:71px;top:${y+48}px;width:1px;height:72px;background:var(--border);"></div>`:""}
  <div class="t w7" style="left:120px;top:${y-2}px;font-size:16px;">${st[0]}</div>
  <div class="t w4 cSec" style="left:120px;top:${y+36}px;font-size:12.5px;">${st[1]}</div>`;}).join("")}
<div class="card bd" style="left:643px;top:250px;width:589px;height:303px;overflow:hidden;">
  <img src="assets/sshot6.png" style="width:100%;height:100%;object-fit:cover;">
</div>
<div class="t w5 cTer" style="left:643px;top:560px;width:589px;font-size:11px;text-align:center;">Claude Code 데스크탑 실행 화면</div>
${foot("06","",false)}`);

/* ---------- S7 체크포인트 ---------- */
slides.push(`${header("01 · CLAUDE CODE",false)}${title("체크포인트 · 여기까지 같이 확인합니다","다음 세 가지가 보이면 두뇌 준비 완료입니다")}
${[["robot","앱이 정상 실행됨","데스크탑 앱이 오류 없이 열림"],
   ["check","로그인 완료","내 계정으로 로그인된 상태"],

const deck=document.getElementById("deck");
function slideClass(i){let c="slide";if(slides[i].includes('data-dark="1"'))c+=" dark";if(slides[i].includes('data-grad="1"'))c+=" grad";return c;}
slides.forEach((html,i)=>{
  const div=document.createElement("div");
  div.className=slideClass(i);
  div.innerHTML=html;
  deck.appendChild(div);
});
const els=[...deck.querySelectorAll(".slide")];
let cur=0;
const counter=document.getElementById("counter");
const bar=document.getElementById("bar");
const params=new URLSearchParams(location.search);
const PRESENTER=params.get("presenter")==="1";
const bc=("BroadcastChannel" in window)?new BroadcastChannel("deck33m2"):null;

function render(broadcast){
  els.forEach((e,i)=>e.classList.toggle("active",i===cur));
  counter.textContent=`${cur+1} / ${els.length}`;
  bar.style.width=`${((cur+1)/els.length)*100}%`;
  document.getElementById("pBtn").disabled=cur===0;
  document.getElementById("nBtn").disabled=cur===els.length-1;
  if(!PRESENTER) location.hash=cur+1;
  if(ovEl.classList.contains("show")) markOverview();
  if(broadcast!==false&&bc) bc.postMessage({type:"idx",cur});
}
function go(n,broadcast){cur=Math.max(0,Math.min(els.length-1,n));render(broadcast);if(PRESENTER)renderPres();}
function next(){go(cur+1);}
function prev(){go(cur-1);}

if(bc) bc.onmessage=(e)=>{
  const d=e.data||{};
  if(d.type==="idx"&&d.cur!==cur){cur=d.cur;render(false);if(PRESENTER)renderPres();}
  if(d.type==="hello"&&!PRESENTER&&bc) bc.postMessage({type:"idx",cur});
};

function buildOverview(){
  slides.forEach((html,i)=>{
    const cell=document.createElement("div"); cell.className="ovCell"; cell.dataset.i=i;
    const num=document.createElement("div"); num.className="ovNum"; num.textContent=i+1;
    const th=document.createElement("div"); th.className="ovThumb";
    const sl=document.createElement("div"); sl.className=slideClass(i);
    sl.innerHTML=html;
    th.appendChild(sl); cell.appendChild(num); cell.appendChild(th);
    cell.onclick=()=>{go(i);toggleOverview(false);};
    ovGrid.appendChild(cell);
    // scale inner slide to thumb width
    requestAnimationFrame(()=>{const w=th.clientWidth;sl.style.transform=`scale(${w/1280})`;sl.style.width="1280px";sl.style.height="720px";});
  });
  ovBuilt=true;
}
function markOverview(){[...ovGrid.children].forEach((c,i)=>c.classList.toggle("cur",i===cur));}
function toggleOverview(show){
  if(!ovBuilt) buildOverview();
  const willShow = show===undefined ? !ovEl.classList.contains("show") : show;
  ovEl.classList.toggle("show",willShow);
  if(willShow){requestAnimationFrame(()=>{[...ovGrid.querySelectorAll(".ovThumb>.slide")].forEach(sl=>{const w=sl.parentElement.clientWidth;sl.style.transform=`scale(${w/1280})`;});markOverview();});}
}
/* presenter window */
function openPresenter(){ window.open(location.pathname+"?presenter=1","presenter33m2","width=1180,height=680"); if(bc) setTimeout(()=>bc.postMessage({type:"idx",cur}),300); }
const presEl=document.getElementById("pres");
let startT=null;
function renderPres(){
  const nextI=Math.min(cur+1,els.length-1);
  const cw=600, nw=380;
  presEl.innerHTML=`
    <div class="col">
      <div class="lab">현재 슬라이드</div>
      <div class="frame" style="width:${cw}px;height:${cw*9/16}px;"><div class="${slideClass(cur)}" style="transform:scale(${cw/1280});width:1280px;height:720px;">${slides[cur]}</div></div>
      <div class="ctrl"><button onclick="prev()">‹ 이전</button><button onclick="next()">다음 ›</button></div>
    </div>
    <div class="col">
      <div class="lab">경과 시간</div><div class="timer" id="pTimer">00:00</div>
      <div class="pgind">${cur+1} / ${els.length}</div>
      <div class="lab" style="margin-top:8px;">다음 슬라이드</div>
      <div class="frame" style="width:${nw}px;height:${nw*9/16}px;">${cur<els.length-1?`<div class="${slideClass(nextI)}" style="transform:scale(${nw/1280});width:1280px;height:720px;">${slides[nextI]}</div>`:`<div style="display:flex;align-items:center;justify-content:center;height:100%;color:#9aa4b2;">마지막 슬라이드</div>`}</div>
    </div>`;
}
if(PRESENTER){
  document.body.classList.add("presenter");
  startT=Date.now();
  setInterval(()=>{const t=document.getElementById("pTimer");if(t){const s=Math.floor((Date.now()-startT)/1000);t.textContent=String(Math.floor(s/60)).padStart(2,"0")+":"+String(s%60).padStart(2,"0");}},500);
  if(bc) bc.postMessage({type:"hello"});
  renderPres();
}

document.addEventListener("keydown",e=>{
  if(e.key==="ArrowRight"||e.key==="PageDown"||e.key===" ")next();
  else if(e.key==="ArrowLeft"||e.key==="PageUp")prev();
  else if(e.key==="Home")go(0);
  else if(e.key==="End")go(els.length-1);
  else if(e.key==="f"||e.key==="F")toggleFull();
  else if(e.key==="o"||e.key==="O")toggleOverview();
  else if(e.key==="Escape"){if(ovEl.classList.contains("show"))toggleOverview(false);}
  else if((e.key==="p"||e.key==="P")&&!PRESENTER)openPresenter();
});
/* scale to fit viewport, keep 16:9 */
function fit(){
  if(PRESENTER) return;
  const scale=Math.min(window.innerWidth/1280, window.innerHeight/720);
  deck.style.transform=`scale(${scale})`;
}
window.addEventListener("resize",fit);
const h=parseInt((location.hash||"").replace("#",""));
if(h>=1&&h<=els.length)cur=h-1;
fit();render(false);
if(PRESENTER) renderPres();
</script>
</body>
</html>
