<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 760" role="img" aria-labelledby="title desc">
  <title id="title">5컷으로 보는 AI 작업 흐름</title>
  <desc id="desc">유저 요청을 받은 Main Agent가 Instruction과 Memory를 확인하고, Context Window에서 자료와 조건을 확인한 뒤 Skill과 Sub Agent를 선택하고 위임해 결과를 사용자에게 전달하는 흐름</desc>
  <defs>
    <style>
      .bg{fill:#fff}.panel{fill:#fff;stroke:#d7d7d7;stroke-width:3}.head{fill:#f5f1ff}.headBlue{fill:#edf4ff}.headAmber{fill:#fff8e2}.headRed{fill:#ffedef}.ink{fill:#252525}.muted{fill:#696969}.purple{fill:#895ffc}.blue{fill:#4e90f9}.red{fill:#f04459}.amber{fill:#ffd857}.soft{fill:#f8f8f8}.dark{fill:#252525}.box{fill:#fff;stroke:#d7d7d7;stroke-width:2}.arrow{stroke:#895ffc;stroke-width:7;fill:none;stroke-linecap:round;stroke-linejoin:round;marker-end:url(#arrow)}.smallArrow{stroke:#895ffc;stroke-width:4;fill:none;stroke-linecap:round;stroke-linejoin:round;marker-end:url(#arrow)}.txt{font-family:Pretendard,Apple SD Gothic Neo,Noto Sans KR,sans-serif}.h{font-size:28px;font-weight:900}.s{font-size:20px;font-weight:900}.p{font-size:17px}.mini{font-size:15px;font-weight:800}.label{font-size:14px;font-weight:900;letter-spacing:.2px}.white{fill:#fff}
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0 0 10 5 0 10z" fill="#895ffc"/></marker>
  </defs>
  <rect class="bg" width="1600" height="760"/>

  <g transform="translate(28 28)">
    <path class="arrow" d="M294 96 H356"/>
    <path class="arrow" d="M604 96 H666"/>
    <path class="arrow" d="M914 96 H976"/>
    <path class="arrow" d="M1224 96 H1286"/>

    <g transform="translate(0 0)">
      <rect class="panel" width="288" height="704" rx="22"/>
      <rect class="head" x="18" y="18" width="252" height="56" rx="14"/>
      <text class="txt h ink" x="30" y="56">1. 요청 받기</text>
      <g transform="translate(34 102)">
        <rect class="box" x="0" y="0" width="220" height="78" rx="16"/>
        <text class="txt s ink" x="18" y="32">User</text>
        <text class="txt p muted" x="18" y="58">“교육자료 만들어줘”</text>
      </g>
      <g transform="translate(74 230)">
        <rect x="20" y="80" width="108" height="120" rx="24" fill="#fff" stroke="#252525" stroke-width="4"/>
        <rect x="38" y="110" width="72" height="44" rx="12" class="dark"/>
        <circle cx="60" cy="132" r="8" class="purple"/><circle cx="90" cy="132" r="8" class="purple"/>
        <path d="M58 170 Q74 184 92 170" stroke="#252525" stroke-width="3" fill="none" stroke-linecap="round"/>
        <circle cx="74" cy="64" r="28" fill="#fff" stroke="#252525" stroke-width="4"/>
        <line x1="74" y1="64" x2="74" y2="36" stroke="#252525" stroke-width="3"/>
        <circle cx="74" cy="30" r="10" fill="#895ffc" stroke="#252525" stroke-width="3"/>
        <text class="txt label purple" x="13" y="236">Main Agent</text>
      </g>
      <g transform="translate(34 510)">
        <rect class="box" x="0" y="0" width="108" height="84" rx="12"/>
        <text class="txt label ink" x="12" y="25">Instruction</text>
        <text class="txt mini muted" x="12" y="49">기본 규칙</text>
        <text class="txt mini muted" x="12" y="68">금지 조건</text>
        <rect class="box" x="126" y="0" width="108" height="84" rx="12"/>
        <text class="txt label ink" x="138" y="25">Memory</text>
        <text class="txt mini muted" x="138" y="49">사용자 선호</text>
        <text class="txt mini muted" x="138" y="68">반복 정보</text>
      </g>
      <text class="txt p muted" x="32" y="650">요청을 받으면 지침과 기억을</text>
      <text class="txt p muted" x="32" y="676">먼저 확인합니다.</text>
    </g>

    <g transform="translate(310 0)">
      <rect class="panel" width="288" height="704" rx="22"/>
      <rect class="headBlue" x="18" y="18" width="252" height="56" rx="14"/>
      <text class="txt h ink" x="30" y="56">2. 작업대에 펼치기</text>
      <g transform="translate(34 108)">
        <rect x="74" y="16" width="156" height="178" rx="26" fill="#edf4ff" stroke="#4e90f9" stroke-width="4"/>
        <text class="txt s blue" x="104" y="50">Context</text>
        <text class="txt s blue" x="102" y="75">Window</text>
        <rect class="box" x="98" y="96" width="108" height="28" rx="7"/>
        <text class="txt mini ink" x="118" y="116">이번 요청</text>
        <rect class="box" x="88" y="132" width="128" height="28" rx="7"/>
        <text class="txt mini ink" x="107" y="152">Instruction</text>
        <rect class="box" x="102" y="168" width="98" height="28" rx="7"/>
        <text class="txt mini ink" x="123" y="188">Memory</text>
        <path class="smallArrow" d="M36 230 H108"/>
        <path class="smallArrow" d="M220 230 H160"/>
      </g>
      <g transform="translate(34 374)">
        <rect class="box" x="0" y="0" width="112" height="46" rx="10"/>
        <text class="txt mini ink" x="22" y="29">첨부 파일</text>
        <rect class="box" x="126" y="0" width="112" height="46" rx="10"/>
        <text class="txt mini ink" x="140" y="29">대화 기록</text>
      </g>
      <text class="txt p muted" x="32" y="650">로봇의 머릿속에 이번 작업에</text>
      <text class="txt p muted" x="32" y="676">자료와 조건을 확인합니다.</text>
    </g>

    <g transform="translate(620 0)">
      <rect class="panel" width="288" height="704" rx="22"/>
      <rect class="headAmber" x="18" y="18" width="252" height="56" rx="14"/>
      <text class="txt h ink" x="30" y="56">3. Skill + Agent 선택</text>
      <g transform="translate(28 104)">
        <rect x="0" y="0" width="232" height="350" rx="20" fill="#f8f8f8" stroke="#895ffc" stroke-width="3"/>
        <text class="txt s purple" x="18" y="34">투명 인터페이스 목록</text>
        <rect class="box" x="18" y="58" width="94" height="132" rx="12"/>
        <text class="txt label purple" x="30" y="84">Skill 목록</text>
        <rect x="30" y="102" width="70" height="32" rx="8" fill="#895ffc"/>
        <text class="txt mini white" x="37" y="123">교육자료</text>
        <rect class="box" x="30" y="142" width="70" height="28" rx="8"/>
        <text class="txt mini ink" x="48" y="161">리뷰</text>
        <rect class="box" x="124" y="58" width="94" height="132" rx="12"/>
        <text class="txt label red" x="135" y="84">Agent 목록</text>
        <rect class="box" x="136" y="98" width="70" height="26" rx="8"/>
        <text class="txt mini ink" x="150" y="117">작성자</text>
        <rect x="136" y="130" width="70" height="28" rx="8" fill="#f04459"/>
        <text class="txt mini white" x="145" y="149">리뷰어</text>
        <rect class="box" x="136" y="164" width="70" height="26" rx="8"/>
        <text class="txt mini ink" x="142" y="183">디자이너</text>
        <path class="smallArrow" d="M72 204 C92 230 116 230 132 204"/>
        <rect x="48" y="250" width="142" height="78" rx="12" fill="#fff8e2" stroke="#ffd857" stroke-width="3"/>
        <text class="txt label ink" x="64" y="277">선택됨</text>
        <text class="txt mini ink" x="64" y="302">교육자료 Skill</text>
        <text class="txt mini ink" x="64" y="324">+ 리뷰어 Agent</text>
      </g>
      <text class="txt p muted" x="32" y="650">작업에 맞는 절차와 역할을</text>
      <text class="txt p muted" x="32" y="676">명확히 골라냅니다.</text>
    </g>

    <g transform="translate(930 0)">
      <rect class="panel" width="288" height="704" rx="22"/>
      <rect class="headRed" x="18" y="18" width="252" height="56" rx="14"/>
      <text class="txt h ink" x="30" y="56">4. 일을 맡기기</text>
      <g transform="translate(30 106)">
        <rect x="0" y="74" width="86" height="92" rx="22" fill="#fff" stroke="#252525" stroke-width="4"/>
        <rect x="15" y="98" width="56" height="34" rx="10" class="dark"/>
        <circle cx="32" cy="115" r="6" class="purple"/><circle cx="55" cy="115" r="6" class="purple"/>
        <text class="txt label purple" x="0" y="198">Main Agent</text>
        <path class="smallArrow" d="M92 118 H150"/>
        <rect class="box" x="148" y="28" width="100" height="58" rx="10"/>
        <text class="txt mini ink" x="164" y="52">명령 카드</text>
        <text class="txt mini muted" x="162" y="74">“이 절차로 작업”</text>
        <rect class="box" x="148" y="106" width="100" height="54" rx="10"/>
        <text class="txt mini ink" x="170" y="139">Skill 전달</text>
      </g>
      <g transform="translate(42 310)">
        <rect x="122" y="36" width="100" height="110" rx="22" fill="#fff8e2" stroke="#252525" stroke-width="4"/>
        <rect x="138" y="62" width="68" height="34" rx="10" class="dark"/>
        <circle cx="158" cy="79" r="6" class="purple"/><circle cx="184" cy="79" r="6" class="purple"/>
        <text class="txt label ink" x="118" y="176">Sub Agent</text>
        <rect class="box" x="0" y="18" width="102" height="44" rx="9"/>
        <text class="txt mini ink" x="16" y="46">초안 만들기</text>
        <rect class="box" x="0" y="82" width="102" height="44" rx="9"/>
        <text class="txt mini ink" x="16" y="110">검토하기</text>
        <rect class="box" x="0" y="146" width="102" height="44" rx="9"/>
        <text class="txt mini ink" x="16" y="174">완성하기</text>
      </g>
      <text class="txt p muted" x="32" y="650">Main Agent가 명령과 Skill을</text>
      <text class="txt p muted" x="32" y="676">Sub Agent에게 전달합니다.</text>
    </g>

    <g transform="translate(1240 0)">
      <rect class="panel" width="288" height="704" rx="22"/>
      <rect class="head" x="18" y="18" width="252" height="56" rx="14"/>
      <text class="txt h ink" x="30" y="56">5. 결과 전달</text>
      <g transform="translate(34 118)">
        <rect x="0" y="62" width="92" height="98" rx="22" fill="#fff" stroke="#252525" stroke-width="4"/>
        <rect x="15" y="88" width="62" height="36" rx="10" class="dark"/>
        <circle cx="34" cy="106" r="6" class="purple"/><circle cx="58" cy="106" r="6" class="purple"/>
        <text class="txt label purple" x="0" y="194">Main Agent</text>
        <path class="smallArrow" d="M98 110 H150"/>
        <rect class="box" x="148" y="34" width="112" height="82" rx="12"/>
        <text class="txt label ink" x="170" y="64">정제</text>
        <text class="txt mini muted" x="170" y="88">누락 확인</text>
        <text class="txt mini muted" x="170" y="108">표현 정리</text>
      </g>
      <g transform="translate(38 342)">
        <rect class="box" x="0" y="0" width="128" height="78" rx="12"/>
        <text class="txt label blue" x="24" y="30">완성 자료</text>
        <text class="txt mini muted" x="24" y="56">슬라이드+스크립트</text>
        <path class="smallArrow" d="M132 38 H184"/>
        <circle cx="222" cy="28" r="26" fill="#ffedef" stroke="#252525" stroke-width="3"/>
        <rect x="190" y="56" width="64" height="72" rx="18" fill="#ffedef" stroke="#252525" stroke-width="3"/>
        <text class="txt label red" x="100" y="160">User에게 전달</text>
      </g>
      <text class="txt p muted" x="32" y="650">최종 결과물을 사용자에게</text>
      <text class="txt p muted" x="32" y="676">이해하기 쉽게 전달합니다.</text>
    </g>
  </g>
</svg>
