<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 360" role="img" aria-labelledby="title desc">
  <title id="title">Skill과 Agent를 투명 인터페이스에서 선택하는 장면</title>
  <desc id="desc">Main Agent가 투명한 인터페이스 목록에서 교육자료 생성 Skill과 슬라이드 리뷰어 Agent를 선택하는 장면</desc>
  <defs>
    <style>
      .bg{fill:#fff}.ink{fill:#252525}.muted{fill:#252525}.purple{fill:#895ffc}.purple2{fill:#f5f1ff}.blue{fill:#4e90f9}.blue2{fill:#edf4ff}.red{fill:#f04459}.red2{fill:#ffedef}.box{fill:#fff;stroke:#d7d7d7;stroke-width:2.5}.ui{fill:#f8f8f8;stroke:#895ffc;stroke-width:4}.selected{fill:#895ffc;stroke:#252525;stroke-width:3}.line{stroke:#252525;stroke-width:3;fill:none;stroke-linecap:round;stroke-linejoin:round}.arrow{stroke:#895ffc;stroke-width:5;fill:none;stroke-linecap:round;stroke-linejoin:round;marker-end:url(#arrow)}.txt{font-family:Pretendard,Apple SD Gothic Neo,Noto Sans KR,sans-serif}.h{font-size:26px;font-weight:900}.s{font-size:20px;font-weight:900}.p{font-size:16px}.mini{font-size:14px;font-weight:850}.whiteText{fill:#fff}
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0 0 10 5 0 10z" fill="#895ffc"/></marker>
  </defs>
  <rect class="bg" width="1180" height="360"/>
  <text class="txt h ink" x="36" y="46">3-4단계: Main Agent가 “절차(Skill)”와 “역할(Agent)”을 함께 선택합니다</text>

  <g transform="translate(56 104)">
    <rect x="0" y="70" width="112" height="112" rx="24" fill="#fff" stroke="#252525" stroke-width="4"/>
    <rect x="18" y="98" width="76" height="42" rx="12" fill="#252525"/>
    <circle cx="42" cy="118" r="8" fill="#895ffc"/><circle cx="70" cy="118" r="8" fill="#895ffc"/>
    <text class="txt mini purple" x="7" y="222">Main Agent</text>
  </g>
  <path class="arrow" d="M180 190 H300"/>

  <g transform="translate(300 72)">
    <rect class="ui" width="560" height="264" rx="28"/>
    <text class="txt h purple" x="32" y="43">선택 인터페이스</text>
    <text class="txt p muted" x="34" y="72">작업 목표에 맞는 Skill과 Agent를 동시에 고릅니다.</text>

    <g transform="translate(34 100)">
      <rect class="box" x="0" y="0" width="222" height="126" rx="16"/>
      <text class="txt s purple" x="18" y="31">Skill 목록</text>
      <rect class="selected" x="18" y="50" width="184" height="38" rx="10"/>
      <text class="txt mini whiteText" x="34" y="75">교육자료 생성 Skill</text>
      <rect class="purple2" x="18" y="96" width="184" height="32" rx="10" stroke="#895ffc" stroke-width="2"/>
      <text class="txt mini ink" x="60" y="118">회의록 정리</text>
    </g>

    <g transform="translate(302 100)">
      <rect class="box" x="0" y="0" width="222" height="134" rx="16"/>
      <text class="txt s red" x="18" y="31">Agent 목록</text>
      <rect class="red2" x="18" y="50" width="184" height="30" rx="10" stroke="#f04459" stroke-width="2"/>
      <text class="txt mini ink" x="58" y="71">작성자 Agent</text>
      <rect x="18" y="88" width="184" height="34" rx="10" fill="#f04459" stroke="#252525" stroke-width="3"/>
      <text class="txt mini whiteText" x="44" y="111">슬라이드 리뷰어</text>
      <rect class="red2" x="18" y="130" width="184" height="30" rx="10" stroke="#f04459" stroke-width="2"/>
      <text class="txt mini ink" x="44" y="151">시각자료 디자이너</text>
    </g>
  </g>

  <path class="arrow" d="M866 196 H954"/>
  <g transform="translate(954 102)">
    <rect class="box" width="190" height="176" rx="18"/>
    <text class="txt s ink" x="24" y="38">선택 결과</text>
    <rect class="purple2" x="24" y="62" width="142" height="42" rx="10" stroke="#895ffc" stroke-width="2"/>
    <text class="txt mini ink" x="42" y="89">Skill: 교육자료</text>
    <rect class="red2" x="24" y="118" width="142" height="42" rx="10" stroke="#f04459" stroke-width="2"/>
    <text class="txt mini ink" x="42" y="145">Agent: 리뷰어</text>
  </g>
</svg>
