<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 620" role="img" aria-labelledby="title desc">
  <title id="title">Plugin은 여러 도구를 묶은 공용 패키지</title>
  <desc id="desc">Plugin 상자 안에 MCP, Skill, Agent, Instruction, Memory, Template이 들어 있고 각각의 의미가 표시된 교육용 인포그래픽</desc>
  <defs>
    <style>
      .bg{fill:#fbfaf6}.ink{fill:#22252a}.muted{fill:#626a73}.teal{fill:#0f8f88}.teal2{fill:#dff4f0}.blue{fill:#3566a6}.blue2{fill:#e4edf7}.amber{fill:#d59a25}.amber2{fill:#faefd3}.coral{fill:#e45d4f}.coral2{fill:#fae5e1}.white{fill:#fff}.box{fill:#fff;stroke:#22252a;stroke-width:4}.line{stroke:#22252a;stroke-width:3;fill:none;stroke-linecap:round;stroke-linejoin:round}.arrow{stroke:#0f8f88;stroke-width:4;fill:none;stroke-linecap:round;stroke-linejoin:round;marker-end:url(#arrow)}.txt{font-family:Pretendard,Apple SD Gothic Neo,Noto Sans KR,sans-serif}.title{font-size:38px;font-weight:900}.h{font-size:24px;font-weight:900}.p{font-size:18px}.mini{font-size:15px;font-weight:700}.label{font-size:14px;font-weight:900}
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M0 0 10 5 0 10z" fill="#0f8f88"/></marker>
  </defs>
  <rect class="bg" width="1200" height="620"/>
  <text class="txt title ink" x="54" y="62">Plugin = 팀이 함께 쓰는 AI 작업 패키지</text>
  <text class="txt p muted" x="56" y="96">도구 연결, 작업 절차, 역할, 기본 규칙, 반복 정보를 한 상자에 묶습니다.</text>

  <g transform="translate(86 160)">
    <path d="M190 230 L520 230 L470 420 L240 420 Z" fill="#0f8f88" stroke="#22252a" stroke-width="5"/>
    <path d="M150 182 L560 182 L520 240 L190 240 Z" fill="#e45d4f" stroke="#22252a" stroke-width="5"/>
    <rect x="326" y="182" width="58" height="238" fill="#f1c14c" stroke="#22252a" stroke-width="4"/>
    <path d="M230 420 Q350 468 470 420" fill="#0a6f6a" opacity=".45"/>
    <text class="txt h white" x="287" y="303">PLUGIN</text>
    <text class="txt mini white" x="256" y="333">공용 패키지</text>
  </g>

  <g transform="translate(80 132)">
    <g transform="translate(22 34)">
      <rect class="box" width="180" height="78" rx="14"/>
      <rect class="blue2" x="14" y="14" width="48" height="48" rx="8"/>
      <path class="line" d="M25 34 H52 M25 48 H52 M52 26 L70 20 M52 54 L70 62"/>
      <text class="txt h blue" x="78" y="32">MCP</text>
      <text class="txt mini muted" x="78" y="56">도구 연결</text>
    </g>
    <path class="arrow" d="M184 112 C240 140 260 160 308 198"/>

    <g transform="translate(338 0)">
      <rect class="box" width="190" height="86" rx="14"/>
      <path d="M30 38 C30 24 44 16 58 24 C62 10 82 10 86 26 C106 20 118 34 110 50 C124 58 116 78 98 74 H42 C28 74 22 54 30 38z" fill="#faefd3" stroke="#22252a" stroke-width="3"/>
      <text class="txt h amber" x="82" y="36">Skill</text>
      <text class="txt mini muted" x="82" y="60">업무 절차</text>
    </g>
    <path class="arrow" d="M426 88 C410 136 392 164 380 196"/>

    <g transform="translate(640 30)">
      <rect class="box" width="200" height="84" rx="14"/>
      <rect x="20" y="22" width="54" height="46" rx="12" fill="#f6fbfa" stroke="#22252a" stroke-width="3"/>
      <rect x="31" y="34" width="32" height="20" rx="6" fill="#172425"/>
      <circle cx="41" cy="44" r="4" fill="#72e1d6"/><circle cx="54" cy="44" r="4" fill="#72e1d6"/>
      <text class="txt h coral" x="90" y="34">Agent</text>
      <text class="txt mini muted" x="90" y="58">전문 역할</text>
    </g>
    <path class="arrow" d="M650 118 C586 150 520 176 454 216"/>
  </g>

  <g transform="translate(96 404)">
    <g>
      <rect class="box" width="226" height="84" rx="14"/>
      <rect class="teal2" x="18" y="16" width="54" height="52" rx="8"/>
      <path class="line" d="M30 34 H60 M30 48 H60"/>
      <text class="txt h teal" x="86" y="34">Instruction</text>
      <text class="txt mini muted" x="86" y="58">기본 규칙</text>
    </g>
    <path class="arrow" d="M220 20 C266 -20 306 -40 352 -56"/>

    <g transform="translate(330 38)">
      <rect class="box" width="200" height="84" rx="14"/>
      <rect class="amber2" x="18" y="16" width="54" height="52" rx="8"/>
      <path class="line" d="M34 28 V60 M48 28 V60"/>
      <text class="txt h amber" x="88" y="34">Memory</text>
      <text class="txt mini muted" x="88" y="58">반복 정보</text>
    </g>
    <path class="arrow" d="M430 38 C420 0 410 -24 398 -56"/>

    <g transform="translate(620 0)">
      <rect class="box" width="224" height="84" rx="14"/>
      <rect class="coral2" x="18" y="16" width="54" height="52" rx="8"/>
      <path class="line" d="M30 32 H60 M30 46 H60 M30 60 H52"/>
      <text class="txt h coral" x="88" y="34">Template</text>
      <text class="txt mini muted" x="88" y="58">예시와 양식</text>
    </g>
    <path class="arrow" d="M642 10 C580 -18 524 -34 460 -52"/>
  </g>

  <g transform="translate(875 162)">
    <rect x="0" y="0" width="238" height="286" rx="18" fill="#fff" stroke="#ded8cd" stroke-width="3"/>
    <text class="txt h ink" x="24" y="42">왜 필요한가?</text>
    <text class="txt p muted" x="24" y="82">개인 노하우를</text>
    <text class="txt p muted" x="24" y="110">팀 표준으로 바꿉니다.</text>
    <line x1="24" y1="136" x2="214" y2="136" stroke="#ded8cd" stroke-width="2"/>
    <text class="txt mini teal" x="24" y="170">1. 같은 지침 사용</text>
    <text class="txt mini teal" x="24" y="202">2. 같은 절차 실행</text>
    <text class="txt mini teal" x="24" y="234">3. 같은 도구 연결</text>
    <text class="txt mini teal" x="24" y="266">4. 결과 품질 표준화</text>
  </g>
</svg>
