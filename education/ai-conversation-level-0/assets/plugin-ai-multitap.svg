<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" role="img" aria-label="AI 멀티탭에 여러 Plugin 묶음이 꽂히고 각 Plugin 안에 MCP Skill Agent Tool이 들어있는 그림">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fbf9ff"/>
      <stop offset="1" stop-color="#ffffff"/>
    </linearGradient>
    <linearGradient id="strip" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#252525"/>
      <stop offset="1" stop-color="#3d3459"/>
    </linearGradient>
    <linearGradient id="pluginA" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#fbf9ff"/>
    </linearGradient>
    <linearGradient id="pluginB" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#f8fff9"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-30%" width="140%" height="170%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#252525" flood-opacity="0.13"/>
    </filter>
    <filter id="cardShadow" x="-20%" y="-25%" width="140%" height="160%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#443b31" flood-opacity="0.10"/>
    </filter>
    <filter id="plugShadow" x="-30%" y="-40%" width="160%" height="190%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#443b31" flood-opacity="0.12"/>
    </filter>
    <style>
      .label { font-family: Arial, Helvetica, sans-serif; letter-spacing: 0; }
      .muted { fill: #252525; }
      .purple { fill: #895ffc; }
      .cable { fill: none; stroke: #8f7cff; stroke-width: 7; stroke-linecap: round; stroke-linejoin: round; }
      .cable-soft { stroke: #b8adff; stroke-width: 4; opacity: .82; }
      .plug-head { fill: #fff; stroke: #cfc3ff; stroke-width: 2; }
      .pin { stroke: #8f7cff; stroke-width: 6; stroke-linecap: round; }
      .plugin-card { stroke: #dedede; stroke-width: 1.4; }
      .plugin-title { fill: #252525; font-size: 34px; font-weight: 900; }
      .plugin-sub { fill: #252525; font-size: 17px; font-weight: 700; }
      .tag { fill: #f5f1ff; stroke: #e7e2f4; stroke-width: 1; }
      .tag-text { fill: #895ffc; font-size: 15px; font-weight: 900; }
      .piece { fill: #fff; stroke: #e7e2f4; stroke-width: 1.2; }
      .piece-title { fill: #252525; font-size: 20px; font-weight: 900; }
      .piece-sub { fill: #252525; font-size: 13px; font-weight: 700; }
      .piece-mark { font-size: 14px; font-weight: 900; }
      .socket { fill: #fff; opacity: .92; }
      .socket-line { stroke: #d8d1ef; stroke-width: 3; stroke-linecap: round; }
    </style>
  </defs>

  <rect width="1200" height="720" rx="34" fill="url(#bg)"/>
  <g opacity=".55">
    <path d="M70 118 H1130" stroke="#f0edf7"/>
    <path d="M70 260 H1130" stroke="#f0edf7"/>
    <path d="M70 402 H1130" stroke="#f0edf7"/>
    <path d="M70 544 H1130" stroke="#f0edf7"/>
  </g>

  <g filter="url(#softShadow)">
    <rect x="84" y="118" width="292" height="484" rx="44" fill="url(#strip)"/>
    <text class="label" x="230" y="184" text-anchor="middle" fill="#fff" font-size="54" font-weight="900">AI</text>
    <text class="label" x="230" y="219" text-anchor="middle" fill="#cdc6ea" font-size="20" font-weight="800">Codex · Claude</text>

    <rect x="128" y="255" width="204" height="102" rx="28" fill="#fff" opacity=".98"/>
    <circle cx="183" cy="306" r="34" fill="#fff" stroke="#ececec" stroke-width="2"/>
    <circle cx="277" cy="306" r="34" fill="#fff" stroke="#ececec" stroke-width="2"/>
    <image href="data:image/svg+xml;base64," x="160" y="283" width="46" height="46"/>
    <image href="data:image/svg+xml;base64," x="254" y="283" width="46" height="46"/>

    <rect x="132" y="420" width="196" height="94" rx="25" fill="#ffffff" opacity=".13" stroke="#ffffff" stroke-opacity=".18"/>
    <text class="label" x="230" y="459" text-anchor="middle" fill="#fff" font-size="23" font-weight="900">Multi Tap</text>
    <text class="label" x="230" y="489" text-anchor="middle" fill="#cfc8ea" font-size="15" font-weight="800">Plugin을 여러 개 꽂습니다</text>

    <circle class="socket" cx="360" cy="278" r="13"/>
    <path class="socket-line" d="M355 272 H365M355 284 H365"/>
    <circle class="socket" cx="360" cy="470" r="13"/>
    <path class="socket-line" d="M355 464 H365M355 476 H365"/>
  </g>

  <path class="cable cable-soft" d="M373 278 C442 214 484 197 544 202"/>
  <path class="cable" d="M373 470 C447 542 494 558 544 535"/>

  <g filter="url(#plugShadow)">
    <rect class="plug-head" x="448" y="238" width="96" height="78" rx="20"/>
    <path class="pin" d="M430 265 H456M430 289 H456"/>
    <text class="label" x="496" y="281" text-anchor="middle" fill="#895ffc" font-size="15" font-weight="900">Plugin</text>
    <text class="label" x="496" y="300" text-anchor="middle" fill="#252525" font-size="11" font-weight="800">A</text>
  </g>

  <g filter="url(#plugShadow)">
    <rect class="plug-head" x="448" y="432" width="96" height="78" rx="20"/>
    <path class="pin" d="M430 459 H456M430 483 H456"/>
    <text class="label" x="496" y="475" text-anchor="middle" fill="#895ffc" font-size="15" font-weight="900">Plugin</text>
    <text class="label" x="496" y="494" text-anchor="middle" fill="#252525" font-size="11" font-weight="800">B</text>
  </g>

  <g filter="url(#cardShadow)">
    <rect x="566" y="78" width="548" height="262" rx="30" fill="url(#pluginA)" class="plugin-card"/>
    <rect x="596" y="110" width="90" height="34" rx="17" class="tag"/>
    <text class="label tag-text" x="641" y="132" text-anchor="middle">Plugin A</text>
    <text class="label plugin-title" x="704" y="136">회의 정리 플러그인</text>
    <text class="label plugin-sub" x="704" y="166">외부 연결, 반복 절차, 역할 담당자를 하나로 묶음</text>

    <rect x="606" y="194" width="222" height="54" rx="16" class="piece"/>
    <text class="label piece-mark" x="629" y="226" fill="#895ffc">MCP</text>
    <text class="label piece-title" x="684" y="219">외부 도구</text>
    <text class="label piece-sub" x="684" y="238">Notion · Slack</text>

    <rect x="852" y="194" width="222" height="54" rx="16" class="piece"/>
    <text class="label piece-mark" x="875" y="226" fill="#008a05">Skill</text>
    <text class="label piece-title" x="930" y="219">반복 절차</text>
    <text class="label piece-sub" x="930" y="238">요약 순서</text>

    <rect x="606" y="264" width="222" height="54" rx="16" class="piece"/>
    <text class="label piece-mark" x="629" y="296" fill="#c2001a">Agent</text>
    <text class="label piece-title" x="684" y="289">역할 담당</text>
    <text class="label piece-sub" x="684" y="308">자료 정리 담당</text>

    <rect x="852" y="264" width="222" height="54" rx="16" class="piece"/>
    <text class="label piece-mark" x="875" y="296" fill="#7a5a21">Tool</text>
    <text class="label piece-title" x="930" y="289">업무 기능</text>
    <text class="label piece-sub" x="930" y="308">파일 생성</text>
  </g>

  <g filter="url(#cardShadow)">
    <rect x="566" y="382" width="548" height="262" rx="30" fill="url(#pluginB)" class="plugin-card"/>
    <rect x="596" y="414" width="90" height="34" rx="17" class="tag"/>
    <text class="label tag-text" x="641" y="436" text-anchor="middle">Plugin B</text>
    <text class="label plugin-title" x="704" y="440">디자인 검토 플러그인</text>
    <text class="label plugin-sub" x="704" y="470">필요한 기능 묶음을 바꿔 꽂으면 다른 일을 맡길 수 있음</text>

    <rect x="606" y="498" width="222" height="54" rx="16" class="piece"/>
    <text class="label piece-mark" x="629" y="530" fill="#895ffc">MCP</text>
    <text class="label piece-title" x="684" y="523">외부 도구</text>
    <text class="label piece-sub" x="684" y="542">Figma 연결</text>

    <rect x="852" y="498" width="222" height="54" rx="16" class="piece"/>
    <text class="label piece-mark" x="875" y="530" fill="#008a05">Skill</text>
    <text class="label piece-title" x="930" y="523">반복 절차</text>
    <text class="label piece-sub" x="930" y="542">검토 체크리스트</text>

    <rect x="606" y="568" width="222" height="54" rx="16" class="piece"/>
    <text class="label piece-mark" x="629" y="600" fill="#c2001a">Agent</text>
    <text class="label piece-title" x="684" y="593">역할 담당</text>
    <text class="label piece-sub" x="684" y="612">UX 리뷰 담당</text>

    <rect x="852" y="568" width="222" height="54" rx="16" class="piece"/>
    <text class="label piece-mark" x="875" y="600" fill="#7a5a21">Tool</text>
    <text class="label piece-title" x="930" y="593">업무 기능</text>
    <text class="label piece-sub" x="930" y="612">화면 분석</text>
  </g>
</svg>
