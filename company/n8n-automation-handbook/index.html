<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>삼삼엠투 n8n 업무자동화 입문 핸드북</title>
    <link rel="stylesheet" href="../../shared/styles/base.css" />
    <style>
      body {
        background: #f8f8f8;
        color: #252525;
      }

      .pdf-page {
        width: min(1180px, calc(100% - 40px));
        margin: 0 auto;
        padding: 36px 0 48px;
      }

      .top-link {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 24px;
        color: #696969;
        font-size: 14px;
        font-weight: 700;
        text-decoration: none;
      }

      .pdf-header {
        display: grid;
        gap: 12px;
        margin-bottom: 22px;
        padding: 30px;
        border: 1px solid #ececec;
        border-radius: 24px;
        background: #ffffff;
        box-shadow: 0 20px 50px rgba(20, 20, 20, 0.06);
      }

      .pdf-header span {
        color: #3563e9;
        font-size: 13px;
        font-weight: 800;
        text-transform: uppercase;
      }

      .pdf-header h1 {
        margin: 0;
        max-width: 840px;
        font-size: clamp(32px, 5vw, 56px);
        line-height: 1.08;
      }

      .pdf-header p {
        margin: 0;
        color: #5f6368;
        font-size: 18px;
        line-height: 1.6;
      }

      .pdf-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-top: 6px;
      }

      .pdf-actions a {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 42px;
        padding: 0 16px;
        border-radius: 10px;
        background: #171717;
        color: #ffffff;
        font-weight: 800;
        text-decoration: none;
      }

      .pdf-actions a.secondary {
        border: 1px solid #e5e7eb;
        background: #ffffff;
        color: #252525;
      }

      .pdf-frame {
        overflow: hidden;
        height: min(78vh, 920px);
        min-height: 560px;
        border: 1px solid #e5e7eb;
        border-radius: 20px;
        background: #ffffff;
        box-shadow: 0 20px 50px rgba(20, 20, 20, 0.06);
      }

      .pdf-frame iframe {
        display: block;
        width: 100%;
        height: 100%;
        border: 0;
      }

      @media (max-width: 720px) {
        .pdf-page {
          width: min(100% - 24px, 1180px);
          padding-top: 22px;
        }

        .pdf-header {
          padding: 22px;
        }

        .pdf-frame {
          height: 72vh;
          min-height: 480px;
        }
      }
    </style>
  </head>
  <body>
    <main class="pdf-page">
      <a class="top-link" href="../../">← 공유자료 홈으로</a>

      <section class="pdf-header" aria-labelledby="page-title">
        <span>Automation Handbook</span>
        <h1 id="page-title">삼삼엠투 n8n 업무자동화 입문 핸드북</h1>
        <p>n8n으로 반복 업무 자동화를 시작하기 위한 입문 PDF 핸드북입니다.</p>
        <div class="pdf-actions">
          <a href="./assets/handbook.pdf" target="_blank" rel="noopener">새 탭에서 열기</a>
          <a class="secondary" href="./assets/handbook.pdf" download>PDF 다운로드</a>
        </div>
      </section>

      <section class="pdf-frame" aria-label="삼삼엠투 n8n 업무자동화 입문 핸드북 PDF">
        <iframe src="./assets/handbook.pdf" title="삼삼엠투 n8n 업무자동화 입문 핸드북"></iframe>
      </section>
    </main>
  </body>
</html>
